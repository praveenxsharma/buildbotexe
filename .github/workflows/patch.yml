name: Auto Build and Release ReVanced

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  check-updates:
    name: Check for Updates
    runs-on: ubuntu-latest
    outputs:
      has_updates: true
    steps:
      - run: echo "Triggering daily build..."

  patch-apps:
    name: Read Configuration 
    needs: check-updates
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: read-matrix
        run: |
          matrix=$(jq -c '.patch_list' patch-config.json)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build-apps:
    name: Build Applications
    needs: patch-apps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.patch-apps.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install Dependencies
        run: pip install -r requirements.txt requests beautifulsoup4
      - name: Build APK
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m src
      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}
          path: "*.apk"

  # ... (Create Single Release job remains same) ...
